    <!-- ─── Structured Data: FAQPage ─────────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Como anunciar em TV com segmentação de público?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A Ummix permite segmentar anúncios em TV por cidade, faixa etária, renda e comportamento de consumo. Você escolhe o veículo, define o público e acompanha os resultados em tempo real pela plataforma."
          }
        },
        {
          "@type": "Question",
          "name": "É possível medir o ROI de anúncios em rádio?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. A tecnologia da Ummix rastreia alcance, frequência e conversões geradas por campanhas em rádio, TV e mídia impressa, entregando métricas precisas mesmo em canais tradicionais."
          }
        },
        {
          "@type": "Question",
          "name": "Quais veículos de TV e rádio estão disponíveis na Ummix?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A plataforma dá acesso a mais de 200 emissoras, incluindo Jovem Pan, CBN, Band News, TV Anhanguera, Antena 1, Nativa FM e muitos outros veículos regionais e nacionais."
          }
        },
        {
          "@type": "Question",
          "name": "Como funciona a segmentação de mídia offline da Ummix?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A Ummix cruza dados comportamentais, geográficos e socioeconômicos de milhões de brasileiros para identificar em quais veículos, horários e formatos seu público está. A campanha é veiculada apenas onde o perfil do seu cliente ideal é mais concentrado."
          }
        }
      ]
    }
    </script>
