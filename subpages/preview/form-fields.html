<!doctype html>
<!-- @dsCard group="Components" name="Form fields" subtitle="Default + focused (red ring)" viewport="720x260" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body)}
  .wrap{padding:22px 24px;display:grid;gap:12px;max-width:520px}
  label{font-size:11px;color:var(--fg2);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:-4px}
  input{width:100%;box-sizing:border-box;padding:14px 18px;border-radius:12px;border:1px solid #e5e7eb;outline:0;font-family:var(--font-body);font-size:14px;color:var(--ummix-dark);transition:all 200ms}
  input:focus{border-color:var(--ummix-red);box-shadow:0 0 0 3px rgba(200,16,46,0.2)}
  .focused{border-color:var(--ummix-red) !important;box-shadow:0 0 0 3px rgba(200,16,46,0.2)}
</style></head>
<body><div class="wrap">
  <label>Default</label>
  <input placeholder="E-mail corporativo">
  <label>Focused</label>
  <input class="focused" value="contato@empresa.com.br">
  <label>Error border uses red</label>
  <input placeholder="Empresa">
</div></body></html>
