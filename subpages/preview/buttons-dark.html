<!doctype html>
<!-- @dsCard group="Components" name="Buttons — Dark" subtitle="On dark backgrounds" viewport="720x140" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#1A1A1A;font-family:var(--font-body)}
  .wrap{padding:24px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .btn{font-family:var(--font-body);font-weight:700;cursor:pointer;border:0;transition:all 200ms cubic-bezier(0.16,1,0.3,1)}
  .primary{background:var(--ummix-red);color:#fff;padding:14px 36px;border-radius:999px;font-size:15px;box-shadow:0 10px 15px rgba(0,0,0,0.25)}
  .primary:hover{background:var(--ummix-red-dark);transform:scale(1.05)}
  .outline{background:transparent;color:#fff;border:2px solid rgba(255,255,255,0.4);padding:12px 32px;border-radius:999px;font-size:15px;font-weight:600}
  .outline:hover{background:rgba(255,255,255,0.1)}
  .white{background:#fff;color:var(--ummix-red);padding:12px 32px;border-radius:999px;font-weight:700;font-size:14px;box-shadow:0 10px 15px rgba(0,0,0,0.2)}
  .white:hover{background:rgba(255,255,255,0.9);transform:scale(1.05)}
  .lbl{font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,0.5);width:100%;margin-top:8px}
</style></head>
<body><div class="wrap">
  <button class="btn primary">Criar conta grátis</button>
  <button class="btn outline">Já tenho conta — Entrar</button>
  <button class="btn white">Criar conta grátis</button>
  <div class="lbl">Primary red · outline white · inverted white (hero)</div>
</div></body></html>
