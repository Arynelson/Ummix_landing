<!doctype html>
<!-- @dsCard group="Spacing" name="Radii" subtitle="sm → full, in red" viewport="720x140" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body)}
  .wrap{padding:22px 24px;display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
  .r{display:flex;flex-direction:column;align-items:center;gap:6px}
  .box{background:var(--ummix-red);border:1px solid rgba(0,0,0,0.08)}
  .lbl{font-family:var(--font-mono);font-size:10.5px;color:var(--fg2)}
  .ttl{font-family:var(--font-heading);font-weight:700;font-size:13px;color:var(--fg1)}
</style></head>
<body><div class="wrap">
  <div class="r"><div class="box" style="width:60px;height:40px;border-radius:8px"></div><div class="ttl">sm</div><div class="lbl">8px · chips</div></div>
  <div class="r"><div class="box" style="width:60px;height:40px;border-radius:12px"></div><div class="ttl">md</div><div class="lbl">12px · inputs</div></div>
  <div class="r"><div class="box" style="width:60px;height:40px;border-radius:16px"></div><div class="ttl">lg</div><div class="lbl">16px · forms</div></div>
  <div class="r"><div class="box" style="width:60px;height:40px;border-radius:20px"></div><div class="ttl">xl</div><div class="lbl">20px · features</div></div>
  <div class="r"><div class="box" style="width:60px;height:40px;border-radius:24px"></div><div class="ttl">2xl</div><div class="lbl">24px · hero, cards</div></div>
  <div class="r"><div class="box" style="width:60px;height:40px;border-radius:9999px"></div><div class="ttl">full</div><div class="lbl">pill · CTAs, tags</div></div>
</div></body></html>
