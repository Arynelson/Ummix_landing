<!doctype html>
<!-- @dsCard group="Components" name="Workflow arrow steps" subtitle="Clip-path chevron sequence" viewport="720x180" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#1A1A1A;font-family:var(--font-body);color:#fff;overflow:hidden}
  .wrap{padding:22px 18px}
  .row{display:flex;gap:2px;align-items:stretch}
  .step{flex:1;background:rgba(200,16,46,0.15);border:1px solid rgba(200,16,46,0.3);padding:14px 12px 12px;text-align:center;min-width:0}
  .step:nth-child(1){clip-path:polygon(0 0,calc(100% - 14px) 0,100% 50%,calc(100% - 14px) 100%,0 100%)}
  .step:not(:first-child):not(:last-child){clip-path:polygon(0 0,calc(100% - 14px) 0,100% 50%,calc(100% - 14px) 100%,0 100%,14px 50%)}
  .step:last-child{clip-path:polygon(0 0,100% 0,100% 100%,0 100%,14px 50%)}
  .num{font-size:9px;font-weight:700;color:rgba(200,16,46,0.6);letter-spacing:0.2em}
  .tile{width:32px;height:32px;border-radius:8px;background:rgba(200,16,46,0.20);margin:6px auto;display:flex;align-items:center;justify-content:center}
  .tile svg{width:16px;height:16px;stroke:var(--ummix-red);fill:none;stroke-width:2}
  .ttl{font-family:var(--font-heading);font-weight:700;font-size:11px;margin:4px 0 2px}
  .dsc{font-size:9.5px;color:rgba(255,255,255,0.5);line-height:1.3}
</style></head>
<body><div class="wrap">
  <div class="row">
    <div class="step"><div class="num">01</div><div class="tile"><svg viewBox="0 0 24 24"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1v-7h3zM3 19a2 2 0 0 0 2 2h1v-7H3z"/></svg></div><div class="ttl">Pesquisa</div><div class="dsc">Entendemos seu cliente</div></div>
    <div class="step"><div class="num">02</div><div class="tile"><svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/></svg></div><div class="ttl">Base de Dados</div><div class="dsc">Dados qualificados</div></div>
    <div class="step"><div class="num">03</div><div class="tile"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.4.9a7 7 0 0 0-1.7-1l-.4-2.5h-4l-.4 2.5a7 7 0 0 0-1.7 1l-2.4-.9-2 3.5L4.1 11a7 7 0 0 0 0 2l-2 1.5 2 3.5 2.4-.9a7 7 0 0 0 1.7 1l.4 2.5h4l.4-2.5a7 7 0 0 0 1.7-1l2.4.9 2-3.5-2-1.5c0-.3.1-.7.1-1z"/></svg></div><div class="ttl">Método Ummix</div><div class="dsc">Metodologia própria</div></div>
    <div class="step"><div class="num">04</div><div class="tile"><svg viewBox="0 0 24 24"><path d="M3 11l18-8v18L3 13v-2z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg></div><div class="ttl">Campanha</div><div class="dsc">Criação por canal</div></div>
  </div>
</div></body></html>
