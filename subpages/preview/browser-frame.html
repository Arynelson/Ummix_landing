<!doctype html>
<!-- @dsCard group="Components" name="Browser frame" subtitle="Dark chrome, fake URL, platform screenshot" viewport="720x260" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body)}
  .wrap{padding:24px;display:flex;gap:16px;align-items:center}
  .frame{border-radius:16px;overflow:hidden;box-shadow:0 25px 50px rgba(0,0,0,0.25);border:1px solid rgba(0,0,0,0.05);max-width:440px;flex:1}
  .chrome{background:#1e1e1e;padding:8px 12px;display:flex;align-items:center;gap:8px}
  .dots{display:flex;gap:5px}
  .dots span{width:9px;height:9px;border-radius:50%}
  .url{flex:1;background:#2a2a2a;border-radius:5px;padding:4px 10px;font-family:ui-monospace,monospace;font-size:10px;color:rgba(255,255,255,0.4)}
  img{width:100%;display:block}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg2);max-width:200px}
</style></head>
<body><div class="wrap">
  <div class="frame">
    <div class="chrome">
      <div class="dots"><span style="background:#ef4444"></span><span style="background:#facc15"></span><span style="background:#22c55e"></span></div>
      <div class="url">app.ummixads.com.br</div>
    </div>
    <img src="../assets/platform-preview-dashboard.png" alt="Dashboard">
  </div>
  <div class="lbl">Browser frame — dark chrome, fake URL, cycles through 4 screenshots every 3s</div>
</div></body></html>
