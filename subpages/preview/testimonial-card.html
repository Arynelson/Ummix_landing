<!doctype html>
<!-- @dsCard group="Components" name="Testimonial card" subtitle="White card, red quote mark, shadow-2xl" viewport="720x260" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#F5F5F5;font-family:var(--font-body)}
  .wrap{padding:28px 24px;display:flex;justify-content:center}
  .card{background:#fff;border-radius:24px;padding:32px;box-shadow:0 25px 50px rgba(0,0,0,0.2);max-width:640px;width:100%}
  .q{width:32px;height:32px;color:rgba(200,16,46,0.3);margin-bottom:12px}
  blockquote{font-size:18px;line-height:1.55;color:var(--ummix-dark);margin:0 0 20px;font-weight:500}
  .author{font-family:var(--font-heading);font-weight:700;color:var(--ummix-dark);font-size:14px}
  .co{font-size:12px;color:var(--ummix-gray-dark);margin-top:2px}
</style></head>
<body><div class="wrap">
  <div class="card">
    <svg class="q" viewBox="0 0 24 24" fill="currentColor"><path d="M3 21c3 0 6-2 6-8V5H3v8h3c0 2-1 4-3 4v4zm12 0c3 0 6-2 6-8V5h-6v8h3c0 2-1 4-3 4v4z"/></svg>
    <blockquote>"A precisão de segmentação que a Ummix oferece em mídia tradicional é impressionante. Reduzimos nosso custo por aquisição em 40%."</blockquote>
    <div class="author">Diretor Comercial</div>
    <div class="co">Cliente Ummix Ads</div>
  </div>
</div></body></html>
