<!doctype html>
<!-- @dsCard group="Brand" name="Partner logos" subtitle="Grayscale → color on hover" viewport="720x130" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--ummix-gray);font-family:var(--font-body)}
  .wrap{padding:22px 24px}
  .row{display:flex;align-items:center;gap:26px;flex-wrap:wrap}
  img{height:36px;width:auto;object-fit:contain;filter:grayscale(1);opacity:0.5;transition:all 500ms}
  img:hover{filter:none;opacity:1}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg2);margin-top:10px}
</style></head>
<body><div class="wrap">
  <div class="row">
    <img src="../assets/logo_sbt.png" alt="SBT">
    <img src="../assets/logo_redetv.png" alt="RedeTV">
    <img src="../assets/logo_bandnews.png" alt="BandNews">
    <img src="../assets/logo_radio89.png" alt="Rádio 89">
    <img src="../assets/logo_sicredi.png" alt="Sicredi">
    <img src="../assets/logo_sicoob.png" alt="Sicoob">
    <img src="../assets/logo_detran.png" alt="Detran">
  </div>
  <div class="lbl">Partner marquee — grayscale opacity 0.5 default, color on hover (infinite 28s scroll)</div>
</div></body></html>
