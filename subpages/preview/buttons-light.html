<!doctype html>
<!-- @dsCard group="Components" name="Buttons — Light" subtitle="Primary pill, outline, header" viewport="720x140" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body)}
  .wrap{padding:24px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .btn{font-family:var(--font-body);font-weight:700;cursor:pointer;border:0;transition:all 200ms cubic-bezier(0.16,1,0.3,1)}
  .primary{background:var(--ummix-red);color:#fff;padding:12px 28px;border-radius:999px;font-size:14px;box-shadow:0 10px 15px rgba(0,0,0,0.10)}
  .primary:hover{background:var(--ummix-red-dark);transform:scale(1.05)}
  .outline{background:transparent;color:var(--ummix-dark);border:2px solid var(--ummix-dark);padding:10px 26px;border-radius:999px;font-size:14px;font-weight:600}
  .outline:hover{background:var(--ummix-dark);color:#fff}
  .header{background:var(--ummix-red);color:#fff;padding:10px 22px;border-radius:8px;font-size:13px;font-weight:600}
  .header:hover{background:var(--ummix-red-dark);transform:scale(1.05)}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg2);width:100%;margin-top:8px}
</style></head>
<body><div class="wrap">
  <button class="btn primary">Criar conta grátis</button>
  <button class="btn outline">Entrar</button>
  <button class="btn header">Plataforma Ummix Ads</button>
  <div class="lbl">Primary pill · outline pill (dark) · header rect · all scale 1.05 on hover</div>
</div></body></html>
