<!doctype html>
<!-- @dsCard group="Spacing" name="Shadows" subtitle="Four elevations" viewport="720x160" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#F5F5F5;font-family:var(--font-body)}
  .wrap{padding:28px 24px;display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  .tile{background:#fff;border-radius:16px;padding:22px;display:flex;flex-direction:column;align-items:center;gap:10px}
  .ttl{font-family:var(--font-heading);font-weight:700;font-size:13px}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg2)}
  .sm{box-shadow:0 1px 2px rgba(0,0,0,0.05)}
  .md{box-shadow:0 4px 6px rgba(0,0,0,0.07),0 2px 4px rgba(0,0,0,0.06)}
  .lg{box-shadow:0 10px 15px rgba(0,0,0,0.10),0 4px 6px rgba(0,0,0,0.05)}
  .xl{box-shadow:0 25px 50px rgba(0,0,0,0.25)}
</style></head>
<body><div class="wrap">
  <div class="tile sm"><div class="ttl">sm</div><div class="lbl">scrolled header</div></div>
  <div class="tile md"><div class="ttl">md</div><div class="lbl">modest lift</div></div>
  <div class="tile lg"><div class="ttl">lg</div><div class="lbl">primary CTAs</div></div>
  <div class="tile xl"><div class="ttl">2xl</div><div class="lbl">hero frame · testimonial</div></div>
</div></body></html>
