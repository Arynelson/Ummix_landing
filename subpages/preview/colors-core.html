<!doctype html>
<!-- @dsCard group="Colors" name="Colors — Core" subtitle="Brand red, dark, gray, white" viewport="720x170" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fafafa;font-family:var(--font-body)}
  .wrap{padding:20px;display:flex;gap:14px;align-items:stretch}
  .sw{flex:1;border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;min-height:110px;border:1px solid var(--border-light)}
  .sw .fill{flex:1;min-height:70px}
  .sw .meta{padding:8px 10px;background:#fff;font-size:11px;line-height:1.35}
  .sw .name{font-weight:700;color:var(--fg1);font-family:var(--font-heading)}
  .sw .hex{font-family:var(--font-mono);color:var(--fg2);font-size:10.5px;margin-top:2px}
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="fill" style="background:#C8102E"></div><div class="meta"><div class="name">Ummix Red</div><div class="hex">#C8102E · brand</div></div></div>
  <div class="sw"><div class="fill" style="background:#A00D24"></div><div class="meta"><div class="name">Red Dark</div><div class="hex">#A00D24 · hover/press</div></div></div>
  <div class="sw"><div class="fill" style="background:#1A1A1A"></div><div class="meta"><div class="name">Ummix Dark</div><div class="hex">#1A1A1A · primary surface</div></div></div>
  <div class="sw"><div class="fill" style="background:#333333"></div><div class="meta"><div class="name">Gray Dark</div><div class="hex">#333333 · secondary text</div></div></div>
  <div class="sw"><div class="fill" style="background:#F5F5F5;border-bottom:1px solid #e5e5e5"></div><div class="meta"><div class="name">Ummix Gray</div><div class="hex">#F5F5F5 · muted bg</div></div></div>
  <div class="sw"><div class="fill" style="background:#FFFFFF;border-bottom:1px solid #e5e5e5"></div><div class="meta"><div class="name">White</div><div class="hex">#FFFFFF · base</div></div></div>
</div></body></html>
