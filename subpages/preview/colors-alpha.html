<!doctype html>
<!-- @dsCard group="Colors" name="Colors — Alpha tints" subtitle="Red & white at common alphas" viewport="720x230" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#1A1A1A;font-family:var(--font-body);color:#fff}
  .wrap{padding:20px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .sw{border-radius:var(--radius-md);overflow:hidden;border:1px solid rgba(255,255,255,0.08)}
  .sw .fill{height:60px}
  .sw .meta{padding:8px 10px;background:#222;font-size:11px}
  .sw .name{font-weight:600;font-family:var(--font-heading);letter-spacing:-0.01em}
  .sw .hex{font-family:var(--font-mono);color:rgba(255,255,255,0.55);font-size:10px;margin-top:2px}
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="fill" style="background:rgba(200,16,46,0.15)"></div><div class="meta"><div class="name">Red / 15</div><div class="hex">workflow card fill</div></div></div>
  <div class="sw"><div class="fill" style="background:rgba(200,16,46,0.20)"></div><div class="meta"><div class="name">Red / 20</div><div class="hex">icon tile fill</div></div></div>
  <div class="sw"><div class="fill" style="background:rgba(200,16,46,0.30)"></div><div class="meta"><div class="name">Red / 30</div><div class="hex">icon tile border</div></div></div>
  <div class="sw"><div class="fill" style="background:rgba(200,16,46,0.60)"></div><div class="meta"><div class="name">Red / 60</div><div class="hex">step number text</div></div></div>
  <div class="sw"><div class="fill" style="background:rgba(255,255,255,0.80)"></div><div class="meta"><div class="name">White / 80</div><div class="hex">primary text on dark</div></div></div>
  <div class="sw"><div class="fill" style="background:rgba(255,255,255,0.60)"></div><div class="meta"><div class="name">White / 60</div><div class="hex">secondary</div></div></div>
  <div class="sw"><div class="fill" style="background:rgba(255,255,255,0.40)"></div><div class="meta"><div class="name">White / 40</div><div class="hex">tertiary / dots</div></div></div>
  <div class="sw"><div class="fill" style="background:rgba(255,255,255,0.10)"></div><div class="meta"><div class="name">White / 10</div><div class="hex">hover surface</div></div></div>
</div></body></html>
