<!doctype html>
<!-- @dsCard group="Type" name="Type — Weight families" subtitle="Baloo 2 vs Plus Jakarta Sans" viewport="720x260" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body)}
  .wrap{padding:22px 24px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .col h4{font-family:var(--font-mono);font-size:10.5px;color:var(--fg2);text-transform:uppercase;letter-spacing:0.1em;margin:0 0 10px}
  .spec{display:flex;align-items:center;gap:14px;margin-bottom:6px;font-size:12px}
  .spec b{font-family:var(--font-heading);color:var(--ummix-dark)}
  .spec span{color:var(--fg2);font-family:var(--font-mono);font-size:11px}
</style></head>
<body><div class="wrap">
  <div class="col">
    <h4>Baloo 2 — Headings</h4>
    <div class="spec"><b style="font-weight:400;font-size:22px">Regular 400</b><span>captions</span></div>
    <div class="spec"><b style="font-weight:500;font-size:22px">Medium 500</b><span>labels</span></div>
    <div class="spec"><b style="font-weight:600;font-size:22px">Semibold 600</b><span>H4</span></div>
    <div class="spec"><b style="font-weight:700;font-size:22px">Bold 700</b><span>H2/H3</span></div>
    <div class="spec"><b style="font-weight:800;font-size:22px">ExtraBold 800</b><span>H1</span></div>
    <div class="spec"><b style="font-weight:900;font-size:22px">Black 900</b><span>display</span></div>
  </div>
  <div class="col">
    <h4>Plus Jakarta Sans — Body</h4>
    <div class="spec"><b style="font-family:var(--font-body);font-weight:400;font-size:16px">Regular 400</b><span>body</span></div>
    <div class="spec"><b style="font-family:var(--font-body);font-weight:500;font-size:16px">Medium 500</b><span>labels</span></div>
    <div class="spec"><b style="font-family:var(--font-body);font-weight:600;font-size:16px">Semibold 600</b><span>buttons</span></div>
    <div class="spec"><b style="font-family:var(--font-body);font-weight:700;font-size:16px">Bold 700</b><span>strong</span></div>
    <div class="spec"><b style="font-family:var(--font-body);font-weight:800;font-size:16px">ExtraBold 800</b><span>wordmark</span></div>
  </div>
</div></body></html>
